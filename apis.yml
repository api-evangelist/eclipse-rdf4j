aid: eclipse-rdf4j
name: Eclipse RDF4J
description: >-
  Eclipse RDF4J is a powerful open-source Java framework for processing and
  handling RDF data. It supports creating, parsing, scalable storage, reasoning,
  and querying with RDF and Linked Data, and ships with an HTTP server (RDF4J
  Server) and a web-based Workbench. The framework offers an easy-to-use Java
  API and SPARQL 1.1 support, and integrates with leading RDF database
  solutions.
type: Index
