aid: eclipse-rdf4j
name: Eclipse RDF4J
description: >-
  Eclipse RDF4J is a powerful Java framework for processing and handling RDF
  data. This includes creating, parsing, scalable storage, reasoning and
  querying with RDF and Linked Data. It offers an easy-to-use API that can be
  connected to all leading RDF database solutions.
type: Index
