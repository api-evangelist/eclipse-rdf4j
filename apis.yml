apis:
  - aid: eclipse-rdf4j:rdf4j-server-rest-api
    name: RDF4J Server REST API
    description: >-
      REST API exposed by the Eclipse RDF4J Server for managing repositories,
      executing SPARQL queries and updates, working with statements, namespaces,
      contexts, and transactions, and importing/exporting RDF in standard
      serialization formats.
    humanURL: https://rdf4j.org/documentation/reference/rest-api/
    baseURL: http://localhost:8080/rdf4j-server
