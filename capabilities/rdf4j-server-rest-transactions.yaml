naftiko: 1.0.0-alpha2
info:
  label: RDF4J Server REST API — Transactions
  description: 'RDF4J Server REST API — Transactions. 3 operations. Lead operation: Begin transaction. Self-contained Naftiko
    capability covering one Eclipse Rdf4j business surface.'
  tags:
  - Eclipse Rdf4j
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ECLIPSE_RDF4J_API_KEY: ECLIPSE_RDF4J_API_KEY
capability:
  consumes:
  - type: http
    namespace: rdf4j-server-rest-transactions
    baseUri: http://localhost:8080/rdf4j-server
    description: RDF4J Server REST API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: repositories-repositoryID-transactions
      path: /repositories/{repositoryID}/transactions
      operations:
      - name: begintransaction
        method: POST
        description: Begin transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryID-transactions-transactionID
      path: /repositories/{repositoryID}/transactions/{transactionID}
      operations:
      - name: executetransactionaction
        method: PUT
        description: Execute transaction action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: action
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: rollbacktransaction
        method: DELETE
        description: Rollback transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rdf4j-server-rest-transactions-rest
    port: 8080
    description: REST adapter for RDF4J Server REST API — Transactions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repositories/{repositoryid}/transactions
      name: repositories-repositoryid-transactions
      description: REST surface for repositories-repositoryID-transactions.
      operations:
      - method: POST
        name: begintransaction
        description: Begin transaction
        call: rdf4j-server-rest-transactions.begintransaction
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{repositoryid}/transactions/{transactionid}
      name: repositories-repositoryid-transactions-transactionid
      description: REST surface for repositories-repositoryID-transactions-transactionID.
      operations:
      - method: PUT
        name: executetransactionaction
        description: Execute transaction action
        call: rdf4j-server-rest-transactions.executetransactionaction
        with:
          action: rest.action
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: rollbacktransaction
        description: Rollback transaction
        call: rdf4j-server-rest-transactions.rollbacktransaction
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rdf4j-server-rest-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for RDF4J Server REST API — Transactions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: begin-transaction
      description: Begin transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rdf4j-server-rest-transactions.begintransaction
      outputParameters:
      - type: object
        mapping: $.
    - name: execute-transaction-action
      description: Execute transaction action
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rdf4j-server-rest-transactions.executetransactionaction
      with:
        action: tools.action
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: rollback-transaction
      description: Rollback transaction
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rdf4j-server-rest-transactions.rollbacktransaction
      outputParameters:
      - type: object
        mapping: $.
