naftiko: 1.0.0-alpha2
info:
  label: RDF4J Server REST API — Statements
  description: 'RDF4J Server REST API — Statements. 4 operations. Lead operation: Get statements. Self-contained Naftiko capability
    covering one Eclipse Rdf4j business surface.'
  tags:
  - Eclipse Rdf4j
  - Statements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ECLIPSE_RDF4J_API_KEY: ECLIPSE_RDF4J_API_KEY
capability:
  consumes:
  - type: http
    namespace: rdf4j-server-rest-statements
    baseUri: http://localhost:8080/rdf4j-server
    description: RDF4J Server REST API — Statements business capability. Self-contained, no shared references.
    resources:
    - name: repositories-repositoryID-statements
      path: /repositories/{repositoryID}/statements
      operations:
      - name: getstatements
        method: GET
        description: Get statements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subj
          in: query
          type: string
        - name: pred
          in: query
          type: string
        - name: obj
          in: query
          type: string
        - name: context
          in: query
          type: array
        - name: infer
          in: query
          type: boolean
      - name: addstatements
        method: POST
        description: Add or update statements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: context
          in: query
          type: array
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: replacestatements
        method: PUT
        description: Replace statements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: context
          in: query
          type: array
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removestatements
        method: DELETE
        description: Remove statements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subj
          in: query
          type: string
        - name: pred
          in: query
          type: string
        - name: obj
          in: query
          type: string
        - name: context
          in: query
          type: array
  exposes:
  - type: rest
    namespace: rdf4j-server-rest-statements-rest
    port: 8080
    description: REST adapter for RDF4J Server REST API — Statements. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repositories/{repositoryid}/statements
      name: repositories-repositoryid-statements
      description: REST surface for repositories-repositoryID-statements.
      operations:
      - method: GET
        name: getstatements
        description: Get statements
        call: rdf4j-server-rest-statements.getstatements
        with:
          subj: rest.subj
          pred: rest.pred
          obj: rest.obj
          context: rest.context
          infer: rest.infer
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addstatements
        description: Add or update statements
        call: rdf4j-server-rest-statements.addstatements
        with:
          context: rest.context
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: replacestatements
        description: Replace statements
        call: rdf4j-server-rest-statements.replacestatements
        with:
          context: rest.context
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removestatements
        description: Remove statements
        call: rdf4j-server-rest-statements.removestatements
        with:
          subj: rest.subj
          pred: rest.pred
          obj: rest.obj
          context: rest.context
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rdf4j-server-rest-statements-mcp
    port: 9090
    transport: http
    description: MCP adapter for RDF4J Server REST API — Statements. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-statements
      description: Get statements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rdf4j-server-rest-statements.getstatements
      with:
        subj: tools.subj
        pred: tools.pred
        obj: tools.obj
        context: tools.context
        infer: tools.infer
      outputParameters:
      - type: object
        mapping: $.
    - name: add-update-statements
      description: Add or update statements
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rdf4j-server-rest-statements.addstatements
      with:
        context: tools.context
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-statements
      description: Replace statements
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rdf4j-server-rest-statements.replacestatements
      with:
        context: tools.context
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-statements
      description: Remove statements
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rdf4j-server-rest-statements.removestatements
      with:
        subj: tools.subj
        pred: tools.pred
        obj: tools.obj
        context: tools.context
      outputParameters:
      - type: object
        mapping: $.
