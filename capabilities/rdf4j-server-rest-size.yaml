naftiko: 1.0.0-alpha2
info:
  label: RDF4J Server REST API — Size
  description: 'RDF4J Server REST API — Size. 1 operations. Lead operation: Get repository size. Self-contained Naftiko capability
    covering one Eclipse Rdf4j business surface.'
  tags:
  - Eclipse Rdf4j
  - Size
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ECLIPSE_RDF4J_API_KEY: ECLIPSE_RDF4J_API_KEY
capability:
  consumes:
  - type: http
    namespace: rdf4j-server-rest-size
    baseUri: http://localhost:8080/rdf4j-server
    description: RDF4J Server REST API — Size business capability. Self-contained, no shared references.
    resources:
    - name: repositories-repositoryID-size
      path: /repositories/{repositoryID}/size
      operations:
      - name: getrepositorysize
        method: GET
        description: Get repository size
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: context
          in: query
          type: array
  exposes:
  - type: rest
    namespace: rdf4j-server-rest-size-rest
    port: 8080
    description: REST adapter for RDF4J Server REST API — Size. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repositories/{repositoryid}/size
      name: repositories-repositoryid-size
      description: REST surface for repositories-repositoryID-size.
      operations:
      - method: GET
        name: getrepositorysize
        description: Get repository size
        call: rdf4j-server-rest-size.getrepositorysize
        with:
          context: rest.context
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rdf4j-server-rest-size-mcp
    port: 9090
    transport: http
    description: MCP adapter for RDF4J Server REST API — Size. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-repository-size
      description: Get repository size
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rdf4j-server-rest-size.getrepositorysize
      with:
        context: tools.context
      outputParameters:
      - type: object
        mapping: $.
