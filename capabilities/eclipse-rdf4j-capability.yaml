naftiko: 1.0.0-alpha2
info:
  label: RDF4J Server REST API
  description: REST API for the Eclipse RDF4J Server. Provides endpoints to list and manage RDF repositories, configure them,
    query and update their contents using SPARQL, manage namespaces, transactions, contexts and statements, and import/export
    RDF data in standard serialization formats. The Eclipse RDF4J Server is a Java server application that exposes this protocol
    over HTTP.
  tags:
  - Eclipse
  - Rdf4j
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: eclipse-rdf4j
    baseUri: http://localhost:8080/rdf4j-server
    description: RDF4J Server REST API HTTP API.
    resources:
    - name: protocol
      path: /protocol
      operations:
      - name: getprotocolversion
        method: GET
        description: Get protocol version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories
      path: /repositories
      operations:
      - name: listrepositories
        method: GET
        description: List repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid
      path: /repositories/{repositoryID}
      operations:
      - name: queryrepository
        method: GET
        description: Query repository (SPARQL)
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: SPARQL query string.
        - name: queryLn
          in: query
          type: string
        - name: infer
          in: query
          type: boolean
        - name: default-graph-uri
          in: query
          type: array
        - name: named-graph-uri
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postqueryorupdate
        method: POST
        description: SPARQL query or update
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrepository
        method: PUT
        description: Create or configure repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleterepository
        method: DELETE
        description: Delete repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-statements
      path: /repositories/{repositoryID}/statements
      operations:
      - name: getstatements
        method: GET
        description: Get statements
        inputParameters:
        - name: subj
          in: query
          type: string
        - name: pred
          in: query
          type: string
        - name: obj
          in: query
          type: string
        - name: context
          in: query
          type: array
        - name: infer
          in: query
          type: boolean
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addstatements
        method: POST
        description: Add or update statements
        inputParameters:
        - name: context
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: replacestatements
        method: PUT
        description: Replace statements
        inputParameters:
        - name: context
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removestatements
        method: DELETE
        description: Remove statements
        inputParameters:
        - name: subj
          in: query
          type: string
        - name: pred
          in: query
          type: string
        - name: obj
          in: query
          type: string
        - name: context
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-size
      path: /repositories/{repositoryID}/size
      operations:
      - name: getrepositorysize
        method: GET
        description: Get repository size
        inputParameters:
        - name: context
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-contexts
      path: /repositories/{repositoryID}/contexts
      operations:
      - name: listcontexts
        method: GET
        description: List contexts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-namespaces
      path: /repositories/{repositoryID}/namespaces
      operations:
