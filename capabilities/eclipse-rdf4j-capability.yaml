        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-namespaces-prefix
      path: /repositories/{repositoryID}/namespaces/{prefix}
      operations:
      - name: getnamespace
        method: GET
        description: Get namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setnamespace
        method: PUT
        description: Set namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletenamespace
        method: DELETE
        description: Delete namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-transactions
      path: /repositories/{repositoryID}/transactions
      operations:
      - name: begintransaction
        method: POST
        description: Begin transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories-repositoryid-transactions-transacti
      path: /repositories/{repositoryID}/transactions/{transactionID}
      operations:
      - name: executetransactionaction
        method: PUT
        description: Execute transaction action
        inputParameters:
        - name: action
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: rollbacktransaction
        method: DELETE
        description: Rollback transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
